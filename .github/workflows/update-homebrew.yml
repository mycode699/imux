name: Update Homebrew Cask

on:
  # Trigger after the release workflow completes (not on release:published,
  # which fires before assets finish uploading — causing SHA mismatch).
  workflow_run:
    workflows: ["Release macOS app"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.58.0 or v0.58.0)'
        required: true

permissions:
  contents: read

env:
  ICC_HOMEBREW_TAP_REPOSITORY: ""
  ICC_REPO_URL: https://github.com/mycode699/imux

jobs:
  update-cask:
    runs-on: ubuntu-latest
    # Only run if the release workflow succeeded (or manual trigger)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # workflow_run: extract tag from the triggering workflow's head branch
            VERSION="${{ github.event.workflow_run.head_branch }}"
          fi
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "Could not determine version" >&2
            exit 1
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "Invalid version: ${VERSION}" >&2
              exit 1
            fi
            echo "Skipping homebrew cask update for non-release ref: ${VERSION}"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "dmg_name=imux-v${VERSION}-macos.dmg" >> $GITHUB_OUTPUT
          echo "Updating homebrew cask to version $VERSION"

      - name: Download DMG and get SHA256
        id: sha
        if: steps.version.outputs.skip != 'true' && env.ICC_HOMEBREW_TAP_REPOSITORY != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_NAME="${{ steps.version.outputs.dmg_name }}"
          URL="${ICC_REPO_URL}/releases/download/v${VERSION}/${DMG_NAME}"
          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -sL -w '%{http_code}' "$URL" -o imux.dmg)
            FILE_SIZE=$(stat --printf="%s" imux.dmg 2>/dev/null || stat -f%z imux.dmg)
            if [ "$HTTP_CODE" = "200" ] && [ "$FILE_SIZE" -gt 1000000 ]; then
              echo "Download OK: HTTP $HTTP_CODE, size $FILE_SIZE bytes"
              break
            fi
            echo "Attempt $i/$MAX_RETRIES: HTTP $HTTP_CODE, size ${FILE_SIZE:-0} bytes"
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "Failed to download DMG after $MAX_RETRIES attempts" >&2
              exit 1
            fi
            sleep 30
          done
          SHA256=$(shasum -a 256 imux.dmg | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "DMG SHA256: $SHA256"

      - name: Checkout Homebrew tap
        if: steps.version.outputs.skip != 'true' && env.ICC_HOMEBREW_TAP_REPOSITORY != ''
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.ICC_HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-imux

      - name: Update cask formula
        if: steps.version.outputs.skip != 'true' && env.ICC_HOMEBREW_TAP_REPOSITORY != ''
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          cat > homebrew-imux/Casks/imux.rb << CASKEOF
          cask "imux" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/mycode699/imux/releases/download/v#{version}/imux-v#{version}-macos.dmg"
            name "imux"
            desc "Native macOS terminal workspace app for AI execution"
            homepage "https://github.com/mycode699/imux"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: ">= :sonoma"

            app "imux.app"
            binary "#{appdir}/imux.app/Contents/Resources/bin/imux"

            zap trash: [
              "~/Library/Application Support/imux",
              "~/Library/Caches/imux",
              "~/Library/Preferences/com.imux.app.plist",
            ]
          end
          CASKEOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' homebrew-imux/Casks/imux.rb

      - name: Verify cask SHA matches DMG
        if: steps.version.outputs.skip != 'true' && env.ICC_HOMEBREW_TAP_REPOSITORY != ''
        run: |
          CASK_SHA=$(grep 'sha256' homebrew-imux/Casks/imux.rb | sed 's/.*"\(.*\)".*/\1/')
          ACTUAL_SHA=$(shasum -a 256 imux.dmg | cut -d' ' -f1)
          if [ "$CASK_SHA" != "$ACTUAL_SHA" ]; then
            echo "SHA mismatch! Cask: $CASK_SHA, Actual: $ACTUAL_SHA" >&2
            exit 1
          fi
          echo "SHA verification passed: $CASK_SHA"

      - name: Commit and push
        if: steps.version.outputs.skip != 'true' && env.ICC_HOMEBREW_TAP_REPOSITORY != ''
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd homebrew-imux
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/imux.rb
          if git diff --staged --quiet; then
            echo "No changes - cask already up to date"
          else
            git commit -m "Update imux to ${VERSION}"
            git push
          fi
